name: Build Desktop Application

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Build & Package
    strategy:
      matrix:
        include:
          - platform: windows
            os: "windows-2022"
          - platform: linux
            os: "ubuntu-22.04"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js & Package Electron
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            npm run electron:dist-win -- --publish never
          else
            npm run electron:dist-linux -- --publish never
          fi
        shell: bash
        env:
          ALLOWED_DEV_ORIGINS: "live.shajon.dev,192.168.0.57,192.168.0.179,127.0.0.1"
          NEXT_PUBLIC_SITE_URL: "https://tv.shajon.dev"
          PLAYLIST_DOMAIN: "iamshajon.com"

      - name: Upload Windows Artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

      - name: Upload Linux Artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish a release
    runs-on: "ubuntu-22.04"
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Get all distributables
        uses: actions/download-artifact@v4

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            **/*.exe
            **/*.zip
            **/*.AppImage
            **/*.deb
            **/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
